# Builds the MyKavo Android APK and publishes it to the rolling
# "mobile-latest" release on the PUBLIC download repo (this repo is
# private), so the newest APK is always at:
#   https://github.com/dakshu007/Mykavo-app-download/releases/latest/download/mykavo.apk
#
# Cross-repo publishing needs the RELEASE_TOKEN secret (a token with
# write access to dakshu007/Mykavo-app-download) - the default
# github.token only reaches this repo.
#
# Runs on every push to main that touches apps/mobile (or this file),
# and can be started manually from the Actions tab (workflow_dispatch).
# Release builds are signed with the Expo-generated debug keystore, which
# is fine for direct installs (sideloading); switch to a real keystore
# before any Play Store submission.

name: android-apk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

concurrency:
  group: android-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint

      - name: Unit tests
        run: npm test

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      # Sign every build with the SAME stable key (stored as a repo secret,
      # standard debug-keystore alias/passwords) so installed apps can update
      # in place - a fresh prebuild keystore would change the signature every
      # run and force uninstall/reinstall.
      - name: Install stable signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/debug.keystore
            echo "Stable keystore installed"
          else
            echo "WARNING: ANDROID_DEBUG_KEYSTORE_B64 secret missing - APK will use a throwaway key"
          fi

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mykavo-android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish rolling release to the public download repo
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          DOWNLOAD_REPO: dakshu007/Mykavo-app-download
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk mykavo.apk
          gh release delete mobile-latest --repo "$DOWNLOAD_REPO" --cleanup-tag --yes || true
          gh release create mobile-latest mykavo.apk \
            --repo "$DOWNLOAD_REPO" \
            --title "MyKavo Android (latest)" \
            --notes "Auto-built from Mykavo@$GITHUB_SHA. Download mykavo.apk, open it on your Android phone, and allow installing from this source. Signs into your normal MyKavo account at https://mykavo.app." \
            --latest
